name: Build CST APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取源码
        uses: actions/checkout@v4

      - name: 配置JDK环境
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: 修复脚本权限
        run: chmod +x gradlew

      - name: 编译Debug版APK
        run: ./gradlew assembleDebug --stacktrace

      - name: 导出成品APK
        uses: actions/upload-artifact@v4
        with:
          name: CST_成品安装包
          path: app/build/outputs/apk/debug/*.apk
